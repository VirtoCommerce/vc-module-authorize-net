<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Authorize.Net Payment">
  <title>Authorize.Net Payment</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="92%" y2="100%">
      <stop offset="0%" stop-color="#5FD080"/>
      <stop offset="100%" stop-color="#2FA85A"/>
    </linearGradient>
    <filter id="lift" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#0B4F2A" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <g filter="url(#lift)">
    <!-- Original dark background -->
    <rect x="20" y="20" width="88" height="88" rx="20" fill="#20293F"/>
    <!-- Large blue circle -->
    <circle cx="53" cy="53" r="29" fill="#3A6AF0"/>
    <!-- Small gold circle -->
    <circle cx="84" cy="88" r="11" fill="#FBB81E"/>
  </g>
</svg>
